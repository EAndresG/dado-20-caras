<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dado de 20 Caras</title>
    <link rel="stylesheet" href="styles.css" />
</head>

<body>
    <main class="app">
        <section class="panel">
            <p class="eyebrow">Juego de mesa digital</p>
            <h1>Dado de 20 caras</h1>
            <p class="subtitle">
                Gira el dado si no tienes uno a mano y sigue la aventura.
            </p>

            <div class="die-container">
                <div class="die" id="die">
                    <span id="die-number">20</span>
                </div>
            </div>

            <div class="buttons-row">
                <button id="roll-btn">Girar dado</button>
                <button id="history-btn" class="secondary-btn">Historial</button>
            </div>

            <div class="result-box">
                <p class="result-label">Resultado</p>
                <p id="result-text">¡Listo para jugar!</p>
            </div>
        </section>
    </main>

    <div id="history-modal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Historial de tiradas</h2>
                <button id="close-history-btn" class="secondary-btn">Cerrar</button>
            </div>
            <ul id="history-list" class="history-list"></ul>
        </div>
    </div>

    <script src="script.js"></script>
    </section>
    </main>

    <script src="script.js"></script>
</body>

</html>
